<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>SportFlow - Login</title>
</head>
<body>
    <h1>Welkom bij SportFlow</h1>
    <p>Log in of maak een account aan om je trainingen te beheren.</p>
    <hr>
    <h2>Inloggen</h2>
    <form>
        <label>Gebruikersnaam:</label><br>
        <input type="text" name="username" required>
        <br><br>

        <label>Wachtwoord:</label><br>
        <input type="password" name="password" required>
        <br><br>

        <button type="submit">Inloggen</button>
    </form>

    <hr>

    <h2>Nieuw account aanmaken</h2>
    <form>
        <label>Kies een gebruikersnaam:</label><br>
        <input type="text" name="new_username" required>
        <br><br>

        <label>Kies een wachtwoord:</label><br>
        <input type="password" name="new_password" required>
        <br><br>

        <label>Bevestig wachtwoord:</label><br>
        <input type="password" name="confirm_password" required>
        <br><br>
        
        <button type="submit">Account aanmaken</button>
    </form>
</body>
</html>
